services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    volumes:
      - ..:/workspaces/ws-research-connect-ghc:cached
      - m365-comm-cache:/home/vscode/.m365-comm
    command: sleep infinity
    # db とネットワーク名前空間を共有 → localhost:27017 で MongoDB にアクセス可能
    network_mode: service:db

  db:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: saas_management
    ports:
      - "5173:5173"
      - "8000:8000"
      - "27017:27017"
      - "9323:9323"
    volumes:
      - mongodata:/data/db
      - ../src/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodata:
  m365-comm-cache:
