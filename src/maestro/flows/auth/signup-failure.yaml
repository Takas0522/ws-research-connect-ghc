appId: ${APP_ID}
tags:
  - auth
onFlowStart:
  - runScript: ../../scripts/seed-data.js
onFlowComplete:
  - runScript: ../../scripts/cleanup-data.js
---
- runFlow:
    file: ../../subflows/load-elements.yaml

- launchApp

- tapOn:
    id: ${output.login.signupLink}

- runFlow:
    file: ../../subflows/signup.yaml
    env:
      EMAIL: "fail-user@test.example.com"
      PASSWORD: "TestPassword123!"
      DISPLAY_NAME: "失敗ユーザー"
      TENANT_CODE: "INVALID_TENANT_CODE"

- assertVisible:
    id: ${output.signup.errorMessage}
