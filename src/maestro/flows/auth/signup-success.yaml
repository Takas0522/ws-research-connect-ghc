appId: ${APP_ID}
tags:
  - auth
onFlowStart:
  - runScript: ../../scripts/seed-data.js
onFlowComplete:
  - runScript: ../../scripts/cleanup-data.js
---
- runFlow:
    file: ../../subflows/load-elements.yaml

- launchApp

- tapOn:
    id: ${output.login.signupLink}

- runFlow:
    file: ../../subflows/signup.yaml
    env:
      EMAIL: "new-user@test.example.com"
      PASSWORD: "NewPassword123!"
      DISPLAY_NAME: "新規ユーザー"
      TENANT_CODE: "E2E_TEST_TENANT"

- assertVisible:
    id: ${output.dashboard.heading}
